project:
  title:        "Hardware Chaos Generator"
  author:       "Noel Jose"
  discord:      "noeljose1290"
  description:  "A hardware implementation of a nonlinear logistic-map system generating chaotic sequences with sensitivity to initial conditions."
  language:     "Verilog"
  clock_hz:     10000000

  tiles: "1x1"

  top_module:  "tt_um_chaos_logistic"

  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "r parameter bit 0"
  ui[1]: "r parameter bit 1"
  ui[2]: "r parameter bit 2"
  ui[3]: "r parameter bit 3"
  ui[4]: "r parameter bit 4"
  ui[5]: "r parameter bit 5"
  ui[6]: "r parameter bit 6"
  ui[7]: "r parameter bit 7"

  # Outputs
  uo[0]: "chaos output bit 4"
  uo[1]: "chaos output bit 5"
  uo[2]: "chaos output bit 6"
  uo[3]: "chaos output bit 7"
  uo[4]: "chaos output bit 8"
  uo[5]: "chaos output bit 9"
  uo[6]: "chaos output bit 10"
  uo[7]: "chaos output bit 11"

  # Bidirectional pins
  uio[0]: "seed bit 0"
  uio[1]: "seed bit 1"
  uio[2]: "seed bit 2"
  uio[3]: "seed bit 3"
  uio[4]: "seed bit 4"
  uio[5]: "seed bit 5"
  uio[6]: "seed bit 6"
  uio[7]: "seed bit 7"

yaml_version: 6
